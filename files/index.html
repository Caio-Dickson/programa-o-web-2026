<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agendamento de Consulta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── PÁGINA: FORMULÁRIO (rota /) ── -->
  <div id="page-form" class="page active">
    <div class="container py-5">

      <div class="text-center mb-5">
        <div class="logo-mark mb-2">✦</div>
        <h1 class="display-title">Agendamento de Consulta</h1>
        <p class="text-muted fw-light">Preencha os dados abaixo para agendar sua consulta</p>
      </div>

      <form id="scheduling-form" novalidate>

        <!-- SEÇÃO 1 -->
        <div class="card section-card mb-4">
          <div class="card-body p-4">
            <div class="d-flex align-items-center gap-3 mb-4 pb-3 border-bottom">
              <span class="section-number">01</span>
              <h2 class="section-title mb-0">Dados do Paciente</h2>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="nome" class="form-label field-label">Nome <span class="text-accent">*</span></label>
                <input type="text" class="form-control" id="nome" placeholder="Seu nome"/>
                <div class="invalid-feedback" id="err-nome"></div>
              </div>
              <div class="col-md-6">
                <label for="sobrenome" class="form-label field-label">Sobrenome <span class="text-accent">*</span></label>
                <input type="text" class="form-control" id="sobrenome" placeholder="Seu sobrenome"/>
                <div class="invalid-feedback" id="err-sobrenome"></div>
              </div>
              <div class="col-md-6">
                <label for="cpf" class="form-label field-label">CPF <span class="text-accent">*</span></label>
                <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" maxlength="14"/>
                <div class="invalid-feedback" id="err-cpf"></div>
              </div>
              <div class="col-md-6">
                <label for="nascimento" class="form-label field-label">Data de Nascimento <span class="text-accent">*</span></label>
                <input type="date" class="form-control" id="nascimento"/>
                <div class="invalid-feedback" id="err-nascimento"></div>
              </div>
              <div class="col-md-6">
                <label for="telefone" class="form-label field-label">Telefone <span class="text-accent">*</span></label>
                <input type="text" class="form-control" id="telefone" placeholder="(00) 00000-0000" maxlength="15"/>
                <div class="invalid-feedback" id="err-telefone"></div>
              </div>
              <div class="col-md-6">
                <label for="cep" class="form-label field-label">CEP <span class="text-accent">*</span></label>
                <input type="text" class="form-control" id="cep" placeholder="00000-000" maxlength="9"/>
                <div class="invalid-feedback" id="err-cep"></div>
              </div>
              <div class="col-12">
                <label for="endereco" class="form-label field-label">Endereço <span class="text-accent">*</span></label>
                <input type="text" class="form-control" id="endereco" placeholder="Rua, número, bairro, cidade"/>
                <div class="invalid-feedback" id="err-endereco"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- SEÇÃO 2 -->
        <div class="card section-card mb-4">
          <div class="card-body p-4">
            <div class="d-flex align-items-center gap-3 mb-4 pb-3 border-bottom">
              <span class="section-number">02</span>
              <h2 class="section-title mb-0">Dados da Consulta</h2>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="clinica" class="form-label field-label">Clínica <span class="text-accent">*</span></label>
                <select class="form-select" id="clinica">
                  <option value="">Selecione uma clínica</option>
                  <option>Clínica Central</option>
                  <option>Clínica Norte</option>
                  <option>Clínica Sul</option>
                  <option>Hospital Geral</option>
                </select>
                <div class="invalid-feedback" id="err-clinica"></div>
              </div>
              <div class="col-md-6">
                <label for="especialidade" class="form-label field-label">Especialidade <span class="text-accent">*</span></label>
                <select class="form-select" id="especialidade">
                  <option value="">Selecione uma especialidade</option>
                  <option>Clínica Geral</option>
                  <option>Cardiologia</option>
                  <option>Dermatologia</option>
                  <option>Ortopedia</option>
                  <option>Pediatria</option>
                  <option>Neurologia</option>
                  <option>Oftalmologia</option>
                </select>
                <div class="invalid-feedback" id="err-especialidade"></div>
              </div>
              <div class="col-12">
                <label for="observacao" class="form-label field-label">
                  Observação <span class="text-muted fw-light small">(opcional)</span>
                </label>
                <textarea class="form-control" id="observacao" rows="3"
                  placeholder="Descreva sintomas ou informações relevantes"></textarea>
              </div>
              <div class="col-12">
                <label for="dataHora" class="form-label field-label">Data e Hora do Agendamento <span class="text-accent">*</span></label>
                <input type="datetime-local" class="form-control" id="dataHora"/>
                <div class="invalid-feedback" id="err-dataHora"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- RODAPÉ -->
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
          <p class="text-muted small mb-0"><span class="text-accent">*</span> Campos obrigatórios</p>
          <button type="submit" class="btn btn-primary-custom px-5">
            Enviar Agendamento
            <svg class="ms-2" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- ── PÁGINA: CONFIRMAÇÃO (rota /agendamento) ── -->
  <div id="page-confirmation" class="page">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card section-card">
            <div class="card-body p-4 p-md-5">

              <div class="text-center mb-5">
                <div class="confirm-badge mb-3">✦</div>
                <h1 class="display-title mb-2">Consulta Agendada!</h1>
                <p class="text-muted fw-light">Seu agendamento foi realizado com sucesso.</p>
              </div>

              <!-- Paciente -->
              <div class="mb-4 pb-4 border-bottom">
                <div class="d-flex align-items-center gap-3 mb-3">
                  <span class="section-number">01</span>
                  <h5 class="section-title mb-0">Dados do Paciente</h5>
                </div>
                <div class="row g-3" id="confirm-patient"></div>
              </div>

              <!-- Consulta -->
              <div class="mb-4">
                <div class="d-flex align-items-center gap-3 mb-3">
                  <span class="section-number">02</span>
                  <h5 class="section-title mb-0">Dados da Consulta</h5>
                </div>
                <div class="row g-3" id="confirm-appt"></div>
              </div>

              <div class="text-center mt-4">
                <button class="btn btn-outline-primary-custom px-4" onclick="goBack()">
                  ← Novo Agendamento
                </button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
